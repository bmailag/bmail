name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Must match the Go version used by the GitLab CI job that builds
          # the vpmail.wasm served at bmail.ag. Bump in lockstep.
          go-version: '1.26.1'
          check-latest: false

      - name: Build vpmail.wasm
        run: make wasm

      - name: Report SHA-256
        run: |
          echo "SHA-256 of vpmail.wasm:"
          shasum -a 256 vpmail.wasm | tee vpmail.wasm.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpmail.wasm
          path: |
            vpmail.wasm
            vpmail.wasm.sha256
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vpmail.wasm
            vpmail.wasm.sha256

  test-crypto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          check-latest: false
      - run: go test ./internal/crypto/...
